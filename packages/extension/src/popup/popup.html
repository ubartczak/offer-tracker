<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JAM — Logowanie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500&family=DM+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="theme-peach">
    <div id="app">
      <div id="view-login" class="view">
        <div class="popup-lid">
          <span class="popup-lid__logo">JAM</span>
          <button class="popup-lid__close">✕</button>
        </div>

        <div class="popup-body">
          <p class="popup-eyebrow">witaj z powrotem</p>
          <p
            class="popup-input popup-input--title"
            style="
              background: none;
              padding-left: 0;
              margin-bottom: 6px;
              font-size: 20px;
            "
          >
            Zaloguj się
          </p>

          <form id="login-form">
            <input
              class="popup-input"
              type="email"
              id="email"
              placeholder="E-mail"
              required
            />
            <input
              class="popup-input"
              type="password"
              id="password"
              placeholder="Hasło"
              required
            />
            <p id="login-error" class="error hidden"></p>
            <button class="popup-btn popup-btn--primary" type="submit">
              Zaloguj się
            </button>
          </form>
        </div>

        <div class="popup-footer">
          <a class="popup-footer__link" href="#" id="go-register"
            >Nie mam konta → Zarejestruj się</a
          >
        </div>
      </div>
    </div>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
